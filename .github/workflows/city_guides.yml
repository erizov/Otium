name: City guides

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prague:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Prague image sources
        run: python scripts/validate_prague_sources.py
      - name: Build Prague HTML (images in repo)
        run: python scripts/build_prague_pdf.py --html-only

  budapest:
